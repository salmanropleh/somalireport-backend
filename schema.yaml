  /api/v1/token/:
    post:
      operationId: token_create
      description: Get JWT access and refresh tokens by providing email and password
      summary: Obtain JWT Token
      tags:
      - JWT Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPairRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  access:
                    type: string
                    description: JWT access token
                  refresh:
                    type: string
                    description: JWT refresh token
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      username:
                        type: string
                      email:
                        type: string
                      first_name:
                        type: string
                      last_name:
                        type: string
                      role:
                        type: string
                      is_verified:
                        type: boolean
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Invalid credentials
          description: ''
  /api/v1/token/refresh/:
    post:
      operationId: token_refresh_create
      description: Get a new access token using a valid refresh token
      summary: Refresh JWT Token
      tags:
      - JWT Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  access:
                    type: string
                    description: New JWT access token
                  refresh:
                    type: string
                    description: New JWT refresh token (if rotating refresh tokens
                      enabled)
                  message:
                    type: string
                    description: Success message
          description: ''
        '400':
          content:
            application/json:
              schema:
                description: Invalid refresh token
          description: ''
  /api/v1/token/status/:
    get:
      operationId: token_status_retrieve
      description: Get information about the current JWT token
      summary: Check Token Status
      tags:
      - JWT Authentication
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    description: Whether the token is valid
                  expires_at:
                    type: string
                    description: Token expiration timestamp
                  time_until_expiry:
                    type: integer
                    description: Seconds until token expires
                  user:
                    type: object
                    description: User information
                  refresh_suggested:
                    type: boolean
                    description: Whether token refresh is suggested
          description: ''
        '401':
          content:
            application/json:
              schema:
                description: Invalid or expired token
          description: ''
