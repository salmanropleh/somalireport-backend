openapi: 3.0.3
info:
  title: Somali Report API
  version: 1.0.0
  description: API for Somali Report News Platform
paths:
  /api/v1/articles/:
    get:
      operationId: articles_list
      description: ViewSet for Article management.
      parameters:
      - in: query
        name: author
        schema:
          type: integer
      - in: query
        name: is_breaking
        schema:
          type: boolean
      - in: query
        name: is_featured
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: primary_category
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: secondary_categories
        schema:
          type: array
          items:
            type: integer
        explode: true
        style: form
      - in: query
        name: status
        schema:
          type: string
          enum:
          - archived
          - draft
          - pending
          - published
        description: |-
          * `draft` - Draft
          * `pending` - Pending Review
          * `published` - Published
          * `archived` - Archived
      - in: query
        name: tags
        schema:
          type: array
          items:
            type: integer
        explode: true
        style: form
      tags:
      - articles
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedArticleListList'
          description: ''
    post:
      operationId: articles_create
      description: ViewSet for Article management.
      tags:
      - articles
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArticleCreateUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ArticleCreateUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ArticleCreateUpdateRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArticleCreateUpdate'
          description: ''
  /api/v1/articles/{id}/:
    get:
      operationId: articles_retrieve
      description: ViewSet for Article management.
