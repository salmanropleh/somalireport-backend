components:
  schemas:
    ArticleCreateUpdate:
      type: object
      description: Serializer for Article create/update operations.
      properties:
        title:
          type: string
          maxLength: 200
        excerpt:
          type: string
          nullable: true
          maxLength: 500
        content:
          type: string
        status:
          $ref: '#/components/schemas/Status48bEnum'
        priority:
          $ref: '#/components/schemas/PriorityEnum'
        primary_category:
          type: integer
          nullable: true
        secondary_categories:
          type: array
          items:
            type: integer
        tags:
          type: array
          items:
            type: integer
        featured_image:
          type: string
          format: uri
          nullable: true
        featured_image_url:
          type: string
          format: uri
          nullable: true
          description: URL for featured image (alternative to file upload)
          maxLength: 200
        meta_title:
          type: string
          nullable: true
          maxLength: 200
        meta_description:
          type: string
          nullable: true
          maxLength: 300
        published_at:
          type: string
          format: date-time
          nullable: true
        scheduled_at:
          type: string
          format: date-time
          nullable: true
        primary_category_expires_at:
          type: string
          format: date-time
          nullable: true
          description: When to auto-archive from primary category
        secondary_categories_expire_at:
          type: string
          format: date-time
          nullable: true
          description: When to auto-archive from secondary categories
        allow_comments:
          type: boolean
        is_featured:
          type: boolean
        is_breaking:
          type: boolean
      required:
      - content
      - title
    ArticleCreateUpdateRequest:
      type: object
      description: Serializer for Article create/update operations.
      properties:
